<!DOCTYPE html>
<html lang="en" class="{% if request.user.is_authenticated and request.user.dark_mode %}dark{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MockLeap{% endblock %} — IELTS Mock Tests</title>
  <meta name="description" content="{% block meta_description %}Practice IELTS with real exam conditions. Get band scores, teacher feedback, and track your progress.{% endblock %}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/design.css' %}">

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

  <!-- Grain overlay -->
  <div class="ml-grain" aria-hidden="true"></div>

  <!-- Toast container rendered via JS -->

  {% block body %}{% endblock %}

  <!-- Main JS -->
  <script src="{% static 'js/main.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
