{% load static %}
<nav class="ml-nav sticky top-0 z-40" role="navigation" aria-label="Main navigation">
  <div class="flex items-center gap-8 w-full max-w-7xl mx-auto px-4">
    {% include "components/brand.html" %}

    <div class="hidden md:flex items-center gap-6 flex-1" role="menubar">
      <a href="{% url 'core:features' %}" class="t-body text-sm font-medium hover:text-[color:var(--ink)] transition-colors">Features</a>
      <a href="{% url 'core:pricing' %}" class="t-body text-sm font-medium hover:text-[color:var(--ink)] transition-colors">Pricing</a>
      <a href="{% url 'community:rooms' %}" class="t-body text-sm font-medium hover:text-[color:var(--ink)] transition-colors">Community</a>
    </div>

    <div class="flex items-center gap-3 ml-auto">
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard:home' %}" class="ml-btn ml-btn-primary ml-btn-sm">Dashboard</a>
      {% else %}
        <a href="{% url 'account_login' %}" class="ml-btn ml-btn-ghost ml-btn-sm">Sign in</a>
        <a href="{% url 'account_signup' %}" class="ml-btn ml-btn-primary ml-btn-sm">Get started free</a>
      {% endif %}

      <button id="dark-toggle" onclick="DarkMode.toggle()" class="ml-btn ml-btn-ghost ml-btn-sm px-2.5" aria-label="Toggle dark mode" style="min-width:36px;padding:0;">
        <svg class="dark:hidden" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v1M8 14v1M1 8H2M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M8 5a3 3 0 100 6 3 3 0 000-6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg class="hidden dark:block" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 8.5A5.5 5.5 0 117.5 3c-.5 2 .5 4.5 2.5 5.5 1.5.7 2.5.5 3 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <!-- Mobile hamburger -->
      <button id="mobile-menu-btn" class="md:hidden ml-btn ml-btn-ghost ml-btn-sm px-2.5" aria-label="Open menu" style="min-width:36px;padding:0;">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="2" y="8.25" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="2" y="12.5" width="14" height="1.5" rx=".75" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
</nav>
