{% load static %}
<aside id="sidebar" class="fixed z-30 w-60 flex flex-col -translate-x-full md:translate-x-0 transition-transform duration-300"
       style="top:12px;bottom:12px;left:12px;width:228px;border-radius:20px;
              background:rgba(250,246,236,0.90);
              backdrop-filter:blur(28px) saturate(180%);
              -webkit-backdrop-filter:blur(28px) saturate(180%);
              border:1px solid rgba(255,255,255,0.72);
              box-shadow:0 1px 0 rgba(255,255,255,.85) inset,
                         0 4px 12px rgba(14,27,46,.06),
                         0 20px 48px -12px rgba(14,27,46,.14);
              overflow:hidden;">

  <!-- Brand -->
  <div class="h-16 flex items-center px-5 border-b flex-shrink-0" style="border-color:var(--border);">
    {% include "components/brand.html" %}
  </div>

  <!-- Nav items -->
  <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-0.5" role="navigation" aria-label="Sidebar navigation">
    <a href="{% url 'dashboard:home' %}" class="nav-item {% if request.resolver_match.app_name == 'dashboard' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" class="flex-shrink-0"><rect x="1" y="1" width="6" height="6" rx="2" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="2" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="2" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="2" stroke="currentColor" stroke-width="1.4"/></svg>
      Dashboard
    </a>

    <p class="t-eyebrow px-2.5 pt-4 pb-1">Practice</p>

    <a href="{% url 'reading:list' %}" class="nav-item {% if request.resolver_match.app_name == 'reading' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.4"/><path d="M5 5h6M5 8h6M5 11h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Reading
    </a>
    <a href="{% url 'listening:list' %}" class="nav-item {% if request.resolver_match.app_name == 'listening' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1a5 5 0 015 5v2a5 5 0 01-10 0V6a5 5 0 015-5z" stroke="currentColor" stroke-width="1.4"/><path d="M8 13v2M6 15h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Listening
    </a>
    <a href="{% url 'writing:list' %}" class="nav-item {% if request.resolver_match.app_name == 'writing' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 12.5L3.5 14 13 4.5 11.5 3 2 12.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M2 12.5V14h1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Writing
    </a>
    <a href="{% url 'speaking:list' %}" class="nav-item {% if request.resolver_match.app_name == 'speaking' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 7.5c0-.828.672-1.5 1.5-1.5h2a1.5 1.5 0 010 3H7A1.5 1.5 0 015.5 7.5z" stroke="currentColor" stroke-width="1.4"/></svg>
      Speaking
    </a>


  </nav>

  <!-- Bottom: profile with click dropdown -->
  <div class="border-t flex-shrink-0" style="border-color:var(--border);position:relative;" id="ml-profile-zone">

    <!-- Popup — hidden by default via visibility/opacity, no display toggling -->
    <div id="ml-profile-popup" style="
        position:absolute;left:12px;right:12px;bottom:calc(100% + 8px);
        background:var(--bg-2);border:1px solid var(--border);
        border-radius:12px;
        box-shadow:0 1px 0 rgba(14,27,46,.04),0 24px 60px -16px rgba(14,27,46,.30);
        padding:4px;z-index:50;
        visibility:hidden;opacity:0;
        transform:translateY(6px);
        transition:opacity .15s,transform .15s,visibility .15s;">
      <a href="{% url 'accounts:profile' %}" class="ml-pmenu-item" id="ml-pm-profile">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Profile
      </a>
      <a href="{% url 'accounts:settings' %}" class="ml-pmenu-item">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 10a2 2 0 100-4 2 2 0 000 4z" stroke="currentColor" stroke-width="1.4"/><path d="M13.3 7a5.7 5.7 0 00-.1-.9l1.4-1.1-1.3-2.3-1.7.7a5.5 5.5 0 00-1.5-.9L9.8 1h-2.6L6.9 2.5a5.5 5.5 0 00-1.5.9l-1.7-.7L2.4 5l1.4 1.1a5.7 5.7 0 000 1.8L2.4 9l1.3 2.3 1.7-.7c.5.4 1 .7 1.5.9L7.2 13h2.6l.3-1.5c.5-.2 1-.5 1.5-.9l1.7.7L14.6 9l-1.4-1.1c.1-.3.1-.6.1-.9z" stroke="currentColor" stroke-width="1.4"/></svg>
        Settings
      </a>
      <button onclick="DarkMode.toggle()" type="button" class="ml-pmenu-item" style="width:100%;text-align:left;border:none;cursor:pointer;font-family:inherit;background:transparent;">
        <svg class="dark:hidden" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v1M8 14v1M1 8H2M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M8 5a3 3 0 100 6 3 3 0 000-6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg class="hidden dark:block" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13 8.5A5.5 5.5 0 117.5 3c-.5 2 .5 4.5 2.5 5.5 1.5.7 2.5.5 3 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Dark Mode
      </button>
      {% if user.is_staff %}
      <a href="/admin/" class="ml-pmenu-item">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M5 9l2 2 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Admin panel
      </a>
      {% endif %}
      <div style="height:1px;background:var(--border);margin:4px 0;"></div>
      <form method="post" action="{% url 'account_logout' %}" style="margin:0;">
        {% csrf_token %}
        <button type="submit" class="ml-pmenu-item ml-pmenu-danger" style="width:100%;text-align:left;border:none;cursor:pointer;font-family:inherit;background:transparent;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M10.5 11L14 8l-3.5-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 8H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          Log out
        </button>
      </form>
    </div>

    <!-- Profile trigger button -->
    <button id="ml-profile-btn" type="button" style="
        width:100%;display:flex;align-items:center;gap:10px;
        padding:12px 16px;border:none;cursor:pointer;
        background:transparent;font-family:inherit;
        transition:background .12s;">
      {% if user.avatar %}
        <img src="{{ user.avatar.url }}" alt="" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;">
      {% else %}
        <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:var(--accent-soft);color:var(--ink);">{{ user.username|first|upper }}</div>
      {% endif %}
      <div style="min-width:0;flex:1;text-align:left;">
        <p style="font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;">{{ user.get_full_name|default:user.username }}</p>
        <p style="font-size:11px;color:var(--muted);margin:0;">{{ user.xp }} XP</p>
      </div>
      <svg id="ml-profile-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" style="color:var(--muted);flex-shrink:0;transition:transform .2s;">
        <path d="M2 8l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</aside>

<style>
.ml-pmenu-item {
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:8px;
  font-size:12px;font-weight:500;color:var(--ink);
  text-decoration:none;cursor:pointer;
  transition:background .1s;
}
.ml-pmenu-item:hover { background:var(--surface-2); }
.ml-pmenu-danger { color:var(--warn) !important; }
.ml-pmenu-danger:hover { background:var(--warn-soft) !important; }
#ml-profile-btn:hover { background:var(--surface-2); }
</style>

<script>
(function () {
  var btn = document.getElementById('ml-profile-btn');
  var popup = document.getElementById('ml-profile-popup');
  var chevron = document.getElementById('ml-profile-chevron');
  if (!btn || !popup) return;

  var isOpen = false;

  function open() {
    isOpen = true;
    popup.style.visibility = 'visible';
    popup.style.opacity = '1';
    popup.style.transform = 'translateY(0)';
    chevron.style.transform = 'rotate(180deg)';
  }

  function close() {
    isOpen = false;
    popup.style.opacity = '0';
    popup.style.transform = 'translateY(6px)';
    popup.style.visibility = 'hidden';
    chevron.style.transform = 'rotate(0deg)';
  }

  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    isOpen ? close() : open();
  });

  document.addEventListener('click', function (e) {
    if (isOpen) {
      var zone = document.getElementById('ml-profile-zone');
      if (zone && !zone.contains(e.target)) close();
    }
  });
}());
</script>
