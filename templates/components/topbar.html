{% comment %}Top bar for authenticated app layout{% endcomment %}
<header class="h-16 flex items-center gap-4 border-b px-6 flex-shrink-0 sticky top-0 z-20"
        style="background:var(--bg-2);border-color:var(--border);">

  <!-- Mobile hamburger -->
  <button id="mobile-menu-btn" class="md:hidden ml-btn ml-btn-ghost ml-btn-sm px-2.5" aria-label="Open menu" style="min-width:36px;padding:0;">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="2" y="8.25" width="14" height="1.5" rx=".75" fill="currentColor"/><rect x="2" y="12.5" width="14" height="1.5" rx=".75" fill="currentColor"/></svg>
  </button>

  <h1 class="text-sm font-semibold flex-1" style="color:var(--ink);">{% block page_title %}{% endblock %}</h1>

  <div class="flex items-center gap-2 ml-auto">
    <!-- Dark mode toggle -->
    <button onclick="DarkMode.toggle()" class="ml-btn ml-btn-ghost ml-btn-sm" aria-label="Toggle dark mode" style="min-width:36px;padding:0;">
      <svg class="dark:hidden" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 1v1M8 14v1M1 8H2M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M8 5a3 3 0 100 6 3 3 0 000-6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <svg class="hidden dark:block" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13 8.5A5.5 5.5 0 117.5 3c-.5 2 .5 4.5 2.5 5.5 1.5.7 2.5.5 3 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <!-- Notifications bell -->
    <a href="{% url 'notifications:list' %}" class="ml-btn ml-btn-ghost ml-btn-sm relative" aria-label="Notifications" style="min-width:36px;padding:0;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1a5 5 0 00-5 5v3l-1.5 2h13L13 9V6a5 5 0 00-5-5zM6.5 13a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
    </a>
  </div>
</header>
