{% comment %}Top bar for authenticated app layout — floating glass pill{% endcomment %}
<div class="flex-shrink-0" style="padding:14px 20px 0;position:sticky;top:0;z-index:20;pointer-events:none;">
  <header id="app-topbar"
          style="pointer-events:all;
                 display:flex;align-items:center;gap:12px;
                 height:52px;padding:0 16px;border-radius:16px;
                 background:rgba(250,246,236,0.85);
                 backdrop-filter:blur(24px) saturate(180%);
                 -webkit-backdrop-filter:blur(24px) saturate(180%);
                 border:1px solid rgba(255,255,255,0.70);
                 box-shadow:0 1px 0 rgba(255,255,255,.85) inset,
                            0 2px 8px rgba(14,27,46,.05),
                            0 8px 24px -4px rgba(14,27,46,.10);">

    <!-- Mobile hamburger -->
    <button id="mobile-menu-btn"
            style="display:none;align-items:center;justify-content:center;
                   width:34px;height:34px;border-radius:10px;border:none;
                   background:transparent;cursor:pointer;color:var(--ink);
                   transition:background .12s;flex-shrink:0;"
            aria-label="Open menu"
            onmouseover="this.style.background='var(--surface-2)'"
            onmouseout="this.style.background='transparent'"
            class="md-hidden-show">
      <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
        <rect x="2" y="4"    width="14" height="1.5" rx=".75" fill="currentColor"/>
        <rect x="2" y="8.25" width="14" height="1.5" rx=".75" fill="currentColor"/>
        <rect x="2" y="12.5" width="14" height="1.5" rx=".75" fill="currentColor"/>
      </svg>
    </button>

    <h1 style="font-size:14px;font-weight:600;color:var(--ink);flex:1;min-width:0;
               overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
      {% block page_title %}{% endblock %}
    </h1>

    <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
      <!-- Dark mode toggle -->
      <button onclick="DarkMode.toggle()"
              style="width:34px;height:34px;border-radius:10px;border:none;
                     background:transparent;cursor:pointer;color:var(--ink-2);
                     display:flex;align-items:center;justify-content:center;
                     transition:background .12s;"
              aria-label="Toggle dark mode"
              onmouseover="this.style.background='var(--surface-2)'"
              onmouseout="this.style.background='transparent'">
        <svg class="dark:hidden" width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v1M8 14v1M1 8H2M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M8 5a3 3 0 100 6 3 3 0 000-6z"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <svg class="hidden dark:block" width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M13 8.5A5.5 5.5 0 117.5 3c-.5 2 .5 4.5 2.5 5.5 1.5.7 2.5.5 3 0z"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>
  </header>
</div>

<style>
.dark #app-topbar {
  background: rgba(8,14,26,0.88) !important;
  border-color: rgba(255,255,255,0.09) !important;
  box-shadow: 0 1px 0 rgba(255,255,255,.05) inset,
              0 2px 8px rgba(0,0,0,.24),
              0 8px 24px -4px rgba(0,0,0,.36) !important;
}

@media (max-width: 768px) {
  #app-topbar button[id="mobile-menu-btn"] { display:flex !important; }
  #app-topbar { border-radius:12px !important; }
}
</style>
