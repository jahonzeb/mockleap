{% extends "admin/base_site.html" %}
{% load i18n admin_urls %}

{% block breadcrumbs %}
<div class="breadcrumbs">
<a href="{% url 'admin:index' %}">{% translate 'Home' %}</a>
&rsaquo; <a href="{% url 'admin:app_list' app_label=app_label %}">{{ app_label|capfirst }}</a>
&rsaquo; <a href="{% url 'admin:'|add:app_label|add:'_'|add:model_name|add:'_changelist' %}">{{ title }}</a>
&rsaquo; Import JSON
</div>
{% endblock %}

{% block content %}
<div id="content-main">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <fieldset class="module aligned">
            <div class="form-row">
                <div>
                    <label for="json_file" class="required">JSON File:</label>
                    <input type="file" name="json_file" id="json_file" accept=".json" required>
                    <p class="help">Upload the exported JSON file containing tests data.</p>
                </div>
            </div>
        </fieldset>
        
        <div class="submit-row">
            <input type="submit" value="Upload and Import" class="default" name="_save">
        </div>
    </form>
</div>
{% endblock %}
