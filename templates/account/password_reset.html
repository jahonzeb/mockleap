{% extends "base/base.html" %}
{% load static %}
{% block title %}Reset password — MockLeap{% endblock %}

{% block body %}
<div class="flex items-center justify-center min-h-screen" style="background:var(--bg);">
  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-8">
      <a href="/" class="ml-mark text-xl" style="text-decoration:none;">MockLeap</a>
    </div>
    <div class="ml-card p-8">
      <h1 class="h-display mb-2" style="font-size:22px;">Reset your password</h1>
      <p class="t-body mb-6" style="font-size:14px;">Enter your email address and we'll send you a reset link.</p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="t-eyebrow block mb-1">Email address</label>
          <input type="email" name="email" class="ml-input" placeholder="you@example.com" autofocus>
        </div>
        <button type="submit" class="ml-btn ml-btn-primary w-full">Send reset link</button>
      </form>
      <div class="mt-6 text-center">
        <a href="{% url 'account_login' %}" class="t-meta text-xs hover:underline">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
