{% extends "base/base.html" %}
{% load static %}
{% block title %}Password changed — MockLeap{% endblock %}

{% block body %}
<div class="flex items-center justify-center min-h-screen" style="background:var(--bg);">
  <div class="w-full max-w-sm px-6 text-center">
    <div class="mb-8">
      <a href="/" class="ml-mark text-xl" style="text-decoration:none;">MockLeap</a>
    </div>
    <div class="ml-card p-8">
      <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-5" style="background:var(--ok-soft);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 class="h-display mb-2" style="font-size:22px;">Password changed!</h1>
      <p class="t-body mb-6" style="font-size:14px;">Your password has been updated. You can now log in with your new password.</p>
      <a href="{% url 'account_login' %}" class="ml-btn ml-btn-primary w-full">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
