{% extends "base/base.html" %}
{% load static %}
{% block title %}Check your email — MockLeap{% endblock %}

{% block body %}
<div class="flex items-center justify-center min-h-screen" style="background:var(--bg);">
  <div class="w-full max-w-sm px-6 text-center">
    <div class="mb-8">
      <a href="/" class="ml-mark text-xl" style="text-decoration:none;">MockLeap</a>
    </div>
    <div class="ml-card p-8">
      <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-5" style="background:var(--ok-soft);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <h1 class="h-display mb-2" style="font-size:22px;">Check your email</h1>
      <p class="t-body" style="font-size:14px;">We've sent a password reset link. Check your inbox and follow the instructions.</p>
      <a href="{% url 'account_login' %}" class="ml-btn ml-btn-ghost w-full mt-6">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
