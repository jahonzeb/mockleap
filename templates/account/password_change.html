{% extends "base/base.html" %}
{% load static %}
{% block title %}Change password — MockLeap{% endblock %}

{% block body %}
<div class="flex items-center justify-center min-h-screen" style="background:var(--bg);">
  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-8">
      <a href="/" class="ml-mark text-xl" style="text-decoration:none;">MockLeap</a>
    </div>
    <div class="ml-card p-8">
      <h1 class="h-display mb-6" style="font-size:22px;">Change password</h1>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
          <label class="t-eyebrow block mb-1">{{ field.label }}</label>
          <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                 class="ml-input {% if field.errors %}border-[color:var(--warn)]{% endif %}"
                 {% if field.value %}value="{{ field.value }}"{% endif %}>
          {% for error in field.errors %}<p class="text-xs mt-1" style="color:var(--warn);">{{ error }}</p>{% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="ml-btn ml-btn-primary w-full mt-2">Change password</button>
      </form>
      <div class="mt-4 text-center">
        <a href="/profile/settings/" class="t-meta text-xs hover:underline">Back to settings</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
