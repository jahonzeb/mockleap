{% extends "base/base.html" %}

{% block body %}
<div class="flex min-h-screen">

  {% include "components/sidebar.html" %}

  <!-- Main content area — offset 240px for floating sidebar (12px margin + 228px width) -->
  <div class="flex-1 flex flex-col min-w-0 md:ml-60" id="main-area">
    {% block topbar %}
    <!-- Mobile hamburger (visible only on small screens) -->
    <div class="md:hidden flex items-center p-4">
      <button id="mobile-menu-btn"
              style="display:flex;align-items:center;justify-content:center;
                     width:34px;height:34px;border-radius:10px;border:none;
                     background:var(--surface-2);cursor:pointer;color:var(--ink);
                     transition:background .12s;flex-shrink:0;"
              aria-label="Open menu">
        <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="4"    width="14" height="1.5" rx=".75" fill="currentColor"/>
          <rect x="2" y="8.25" width="14" height="1.5" rx=".75" fill="currentColor"/>
          <rect x="2" y="12.5" width="14" height="1.5" rx=".75" fill="currentColor"/>
        </svg>
      </button>
      <h1 style="font-size:14px;font-weight:600;color:var(--ink);flex:1;min-width:0;
                 overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:12px;">
        {% block page_title %}{% endblock %}
      </h1>
    </div>
    {% endblock %}

    <main class="flex-1 p-5 md:p-6" id="main-content" style="padding-top:40px;">
      {% if messages %}
        <div class="mb-5 space-y-2">
          {% for message in messages %}
            <div class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium
              {% if message.tags == 'error' %}bg-[color:var(--warn-soft)] text-[color:var(--warn)]
              {% elif message.tags == 'success' %}bg-[color:var(--ok-soft)] text-[color:var(--ok)]
              {% else %}bg-[color:var(--surface-2)] text-[color:var(--ink-2)]{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </div>

</div>

<!-- Mobile overlay -->
<div id="sidebar-overlay"
     class="fixed inset-0 z-20 hidden"
     style="background:rgba(0,0,0,.40);backdrop-filter:blur(4px);"
     onclick="closeSidebar()"></div>

<script>
(function () {
  var sb = document.getElementById('sidebar');
  var ov = document.getElementById('sidebar-overlay');
  var btn = document.getElementById('mobile-menu-btn');
  if (!sb || !ov || !btn) return;

  function openSidebar() {
    sb.style.transform = 'translateX(0)';
    ov.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  window.closeSidebar = function () {
    sb.style.transform = 'translateX(-100%)';
    ov.classList.add('hidden');
    document.body.style.overflow = '';
  };

  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    var isOpen = sb.style.transform === 'translateX(0)' || sb.style.transform === 'translateX(0px)';
    isOpen ? closeSidebar() : openSidebar();
  });

  ov.addEventListener('click', closeSidebar);
}());
</script>
{% endblock %}
