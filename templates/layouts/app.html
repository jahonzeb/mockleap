{% extends "base/base.html" %}

{% block body %}
<div class="flex min-h-screen">

  {% include "components/sidebar.html" %}

  <!-- Main content area — offset 240px for floating sidebar (12px margin + 228px width) -->
  <div class="flex-1 flex flex-col min-w-0 md:ml-60" id="main-area">
    {% block topbar %}
      {% include "components/topbar.html" %}
    {% endblock %}

    <main class="flex-1 p-5 md:p-6" id="main-content" style="padding-top:14px;">
      {% if messages %}
        <div class="mb-5 space-y-2">
          {% for message in messages %}
            <div class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium
              {% if message.tags == 'error' %}bg-[color:var(--warn-soft)] text-[color:var(--warn)]
              {% elif message.tags == 'success' %}bg-[color:var(--ok-soft)] text-[color:var(--ok)]
              {% else %}bg-[color:var(--surface-2)] text-[color:var(--ink-2)]{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </div>

</div>

<!-- Mobile overlay -->
<div id="sidebar-overlay"
     class="fixed inset-0 z-20 hidden"
     style="background:rgba(0,0,0,.40);backdrop-filter:blur(4px);"
     onclick="closeSidebar()"></div>

<script>
function closeSidebar() {
  document.getElementById('sidebar').classList.add('-translate-x-full');
  document.getElementById('sidebar-overlay').classList.add('hidden');
}

const _mobileBtn = document.getElementById('mobile-menu-btn');
if (_mobileBtn) {
  _mobileBtn.addEventListener('click', () => {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    const isOpen = !sb.classList.contains('-translate-x-full');
    if (isOpen) { closeSidebar(); }
    else {
      sb.classList.remove('-translate-x-full');
      ov.classList.remove('hidden');
    }
  });
}

</script>
{% endblock %}
